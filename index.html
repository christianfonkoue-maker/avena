<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alibaba Clone</title>

    <!-- cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- css -->
    <link rel="stylesheet" href="assets/css/global.css">

</head>
<body>
    <header>
        <div class="header_main">
            <div class="main1logo">
                <img src="assets/images/Logo vectoriel Avena.png" alt="">
            </div>
            <div class="main2sec">
                <div class="main2">
                    <div class="main2three">
                        <input type="search" placeholder="hello kitty">
                    </div>
                    <div class="main2five">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <p>Search</p>
                    </div>
                </div>
            </div>
            <div class="main3sec">
                <div class="main3">
                    <div class="main3one">
                        <div class="main3one_up">
                            <p>Contry:</p>
                        </div>
                        <div class="main3one_down">
                            <img src="assets/images/country-flags-main/svg/gh.svg" alt="">
                            <p><b>GH</b></p>
                        </div>
                    </div>

                    <div class="main3two">
                        <i class="fa-regular fa-envelope fa-lg"></i>
                        <p>Messaging</p>
                    </div>
                    <div class="main3four">
                        <p>Sign up</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="header_btm">
            <div class="hbtm_left">
                <div class="hbtm_left1 nav-item--categories" id="categoryTrigger">
  <button class="nav-btn categories-btn" aria-haspopup="true" aria-expanded="false" aria-controls="megaMenu">
    <i class="fa-solid fa-bars-staggered"></i>
    <p>All Category</p>
  </button>

  <!-- LE MEGA MENU VIENT ICI — copie-colle ce bloc entier -->
  <div class="mega-menu" id="megaMenu" role="dialog" aria-label="Catégories" inert>
    <div class="mega-menu__inner">
      <aside class="mega-menu__sidebar">
        <p class="sidebar__label">Toutes les catégories</p>
        <ul class="sidebar__list" role="list"></ul>
      </aside>
      <div class="mega-menu__content"></div>
    </div>
  </div>

</div>
                <div class="hbtm_left1">
                    <p>Get a Services</p>
                </div>
                <div class="hbtm_left1">
                    <p>upcaming event</p>
                </div>
                <div class="hbtm_left1">
                    <p>Avena.com Membership</p>
                </div>
            </div>
            <div class="hbtm_right">
                <div class="hbtm_left1">
                    <p>Sell</p>
                </div>
                <div class="hbtm_left1">
                    <p>Offer a Services</p>
                </div>
                <div class="hbtm_left1">
                    <p>Add event</p>
                </div>
                <div class="hbtm_left1">
                    <p>Become a supplier</p>
                </div>
            </div>
        </div>
    </header>
  <div class="mega-menu-backdrop" id="menuBackdrop"></div>
  <div id="product-grid-home"
     data-pg-source="mock"
     data-pg-limit="24">
  </div>
  <!--produit avec recomandation personaliser
    <div id="product-grid-home"
     data-pg-source="mock"
     data-pg-limit="24"
     data-pg-personalized="true">
    </div>-->

  <script src="assets/js/mega-menu.js"></script>
  <script src="assets/js/modules/product-grid.js"></script>
</body>
</html>
