<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avena - Category</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/pages/category.css">
    <!-- Styles de secours -->
    <style>
        .category-page { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .category-hero { background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%); color: white; padding: 40px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .category-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .category-icon { font-size: 4rem; background: rgba(255,255,255,0.2); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .category-info h1 { font-size: 2rem; margin: 0; }
        .category-info p { margin: 5px 0 0; opacity: 0.9; }
        .category-stats { background: rgba(255,255,255,0.15); padding: 12px 24px; border-radius: 30px; font-weight: 500; }
        .category-layout { display: flex; gap: 30px; }
        .category-sidebar { width: 280px; flex-shrink: 0; }
        .category-content { flex: 1; }
        .filters-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #e4e7f0; }
        .clear-filters-btn { background: none; border: none; color: #4361ee; cursor: pointer; font-size: 0.85rem; }
        .filter-section { margin-bottom: 20px; border: 1px solid #e4e7f0; border-radius: 12px; overflow: hidden; }
        .filter-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f9fc; cursor: pointer; }
        .filter-header h4 { margin: 0; font-size: 0.95rem; font-weight: 600; }
        .filter-toggle { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #666; }
        .filter-content { padding: 12px 16px; }
        .filter-content.collapsed { display: none; }
        .price-range, .popular-filter, .filter-option { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; font-size: 0.85rem; }
        .price-range input, .popular-filter input, .filter-option input { margin: 0; width: 16px; height: 16px; cursor: pointer; }
        .price-range span, .popular-filter span, .filter-option span { flex: 1; }
        .count { color: #9499b5; font-size: 0.75rem; }
        .products-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .sort-by { display: flex; align-items: center; gap: 10px; }
        .sort-by select { padding: 8px 12px; border: 1px solid #e4e7f0; border-radius: 8px; background: white; }
        .view-options { display: flex; gap: 5px; }
        .view-btn { padding: 8px 12px; border: 1px solid #e4e7f0; background: white; border-radius: 8px; cursor: pointer; }
        .view-btn.active { background: #4361ee; color: white; border-color: #4361ee; }
        .pg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        @media (max-width: 1200px) { .pg-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 860px) { .pg-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .pg-grid { grid-template-columns: repeat(1, 1fr); } .category-layout { flex-direction: column; } .category-sidebar { width: 100%; } }
        .pg-card { background: white; border: 1px solid #e4e7f0; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .pg-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(67,97,238,0.15); }
        .pg-card__img-wrap { aspect-ratio: 1 / 1; overflow: hidden; background: #f7f8fc; display: flex; align-items: center; justify-content: center; }
        .pg-card__img { width: 100%; height: 100%; object-fit: cover; }
        .pg-card__placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; padding: 16px; color: #4361ee; }
        .pg-card__body { padding: 12px; }
        .pg-card__title { font-size: 0.85rem; font-weight: 500; color: #1a1d2e; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .pg-card__price { font-size: 1rem; font-weight: 700; color: #d94a00; margin-bottom: 6px; }
        .pg-card__meta { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: #9499b5; margin-bottom: 8px; }
        .pg-stars { color: #f5a623; }
        .pg-card__footer { padding-top: 8px; border-top: 1px solid #e4e7f0; font-size: 0.7rem; color: #9499b5; }
        .pagination-container { display: flex; justify-content: center; margin-top: 40px; }
        .pagination-controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .page-btn { padding: 8px 14px; border: 1px solid #e4e7f0; background: white; border-radius: 8px; cursor: pointer; }
        .page-btn.active { background: #4361ee; color: white; border-color: #4361ee; }
        .loading { text-align: center; padding: 40px; color: #9499b5; }
        .sk { background: linear-gradient(90deg, #f0f0f5 25%, #e4e7f0 50%, #f0f0f5 75%); background-size: 200% 100%; animation: sk-shimmer 1.4s infinite; border-radius: 6px; height: 200px; }
        @keyframes sk-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <avenna-header></avenna-header>

    <main class="category-page">
        <div class="container">
            <!-- Hero Section -->
            <section class="category-hero">
                <div class="category-info">
                    <div class="category-icon" id="categoryIcon">💻</div>
                    <div>
                        <h1 id="categoryTitle">Loading...</h1>
                        <p id="categoryDescription">Discover amazing products</p>
                    </div>
                </div>
                <div class="category-stats">
                    <span id="productCount">0</span> products available
                </div>
            </section>

            <div class="category-layout">
                <!-- Sidebar Filters -->
                <aside class="category-sidebar">
                    <div class="filters-header">
                        <h3>Filters</h3>
                        <button id="clearAllFilters" class="clear-filters-btn">Clear all</button>
                    </div>

                    <!-- Price Filter -->
                    <div class="filter-section">
                        <div class="filter-header">
                            <h4>Price, GH₵</h4>
                            <button class="filter-toggle" aria-label="Toggle">−</button>
                        </div>
                        <div class="filter-content" id="priceRangesContainer">
                            <div class="loading">Loading prices...</div>
                        </div>
                    </div>

                    <!-- Popular Filters -->
                    <div class="filter-section">
                        <div class="filter-header">
                            <h4>Popular Filters</h4>
                            <button class="filter-toggle" aria-label="Toggle">−</button>
                        </div>
                        <div class="filter-content" id="popularFiltersContainer">
                            <div class="loading">Loading filters...</div>
                        </div>
                    </div>

                    <!-- Dynamic Filters Container -->
                    <div id="dynamicFiltersContainer"></div>
                </aside>

                <!-- Products Area -->
                <div class="category-content">
                    <div class="products-toolbar">
                        <div class="sort-by">
                            <label for="sortSelect">Sort by:</label>
                            <select id="sortSelect">
                                <option value="newest">Newest first</option>
                                <option value="price_asc">Price: Low to High</option>
                                <option value="price_desc">Price: High to Low</option>
                                <option value="popular">Most popular</option>
                            </select>
                        </div>
                        <div class="view-options">
                            <button class="view-btn active" data-view="grid">⊞</button>
                            <button class="view-btn" data-view="list">≡</button>
                        </div>
                    </div>

                    <!-- Product Grid Container -->
                    <div id="productGridContainer"></div>

                    <!-- Pagination -->
                    <div id="paginationContainer" class="pagination-container"></div>
                </div>
            </div>
        </div>
    </main>

    <avenna-footer></avenna-footer>

    <!-- Charger la config d'abord -->
    <script src="../assets/js/config.js"></script>
    
    <!-- Puis le module principal (un SEUL script type="module") -->
    <script type="module">
        import { CategoryPage } from '../assets/js/pages/category.js';
        
        // Récupérer les paramètres URL
        const urlParams = new URLSearchParams(window.location.search);
        const categoryKey = urlParams.get('cat') || 'electronics';
        const subcategory = urlParams.get('sub') || null;
        
        // Initialiser la page
        const categoryPage = new CategoryPage({
            categoryKey: categoryKey,
            subcategory: subcategory,
            productGridContainerId: 'productGridContainer',
            paginationContainerId: 'paginationContainer'
        });
        
        categoryPage.init();
    </script>
</body>
</html>
