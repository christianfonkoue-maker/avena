<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Avena</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/avena/assets/css/global.css">
  <style>
    .product-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    .product-page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    
    @media (max-width: 768px) {
      .product-page { grid-template-columns: 1fr; }
    }
    
    /* Gallery */
    .product-gallery {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .gallery-main {
      aspect-ratio: 1 / 1;
      background: #f7f8fc;
      border-radius: 16px;
      overflow: hidden;
    }
    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .gallery-thumbs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .gallery-thumbs .thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s, border 0.2s;
      border: 2px solid transparent;
    }
    .gallery-thumbs .thumb.active,
    .gallery-thumbs .thumb:hover {
      opacity: 1;
      border-color: #4361ee;
    }
    
    /* Info */
    .product-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .product-category {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #4361ee;
      font-weight: 700;
    }
    .product-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1d2e;
    }
    .product-price {
      font-size: 1.8rem;
      font-weight: 800;
      color: #4361ee;
    }
    .product-meta {
      background: #f8f9fc;
      padding: 16px;
      border-radius: 12px;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e2e6f3;
    }
    .meta-row:last-child {
      border-bottom: none;
    }
    .meta-label {
      font-weight: 600;
      color: #5c6080;
    }
    .meta-value {
      color: #1a1d2e;
    }
    .stars {
      color: #f5a623;
    }
    .product-description h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .product-description p {
      line-height: 1.6;
      color: #5c6080;
    }
    .product-seller {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f8f9fc;
      border-radius: 12px;
    }
    .seller-avatar img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }
    .seller-name {
      font-weight: 700;
    }
    .seller-university {
      font-size: 0.8rem;
      color: #7a7f9a;
    }
    .product-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .btn-primary, .btn-secondary, .btn-danger {
      flex: 1;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
    }
    .btn-primary {
      background: #4361ee;
      color: white;
    }
    .btn-primary:hover {
      background: #3451d1;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #eef0fd;
      color: #4361ee;
    }
    .btn-danger {
      background: #e53e3e;
      color: white;
    }
    .error-state {
      text-align: center;
      padding: 60px;
    }
  </style>
</head>
<body>

  <div class="product-container">
    <div id="product-details">
      <div class="error-state">Loading product...</div>
    </div>
  </div>

  <script src="/avena/assets/js/mega-menu.js"></script>
  <script src="/avena/assets/js/modules/auth.js"></script>
  <script src="/avena/assets/js/modules/messaging.js"></script>
  <script src="/avena/assets/js/modules/product.js"></script>
  <script src="/avena/assets/js/components-loader.js" type="module"></script>
</body>
</html>
