<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password — Avena</title>
  <link rel="stylesheet" href="../../assets/css/components/auth.css"/>
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand__icon"><svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor"/></svg></div>
    <span class="auth-brand__name">Avena</span>
  </div>
  <h1 class="auth-title">Set new password</h1>
  <p class="auth-subtitle">Choose a strong password for your account.</p>
  <div class="auth-alert auth-alert--error"   id="alertError"></div>
  <div class="auth-alert auth-alert--success" id="alertSuccess"></div>
  <form class="auth-form" id="resetForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="password">New Password</label>
      <div class="form-input-wrap">
        <input class="form-input" id="password" type="password" placeholder="Min. 8 characters" required/>
        <button type="button" class="input-toggle" onclick="const i=document.getElementById('password');i.type=i.type==='password'?'text':'password'">
          <svg viewBox="0 0 20 20" fill="none"><path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirm">Confirm Password</label>
      <input class="form-input" id="confirm" type="password" placeholder="Repeat password" required/>
    </div>
    <button class="btn-auth" type="submit" id="submitBtn">
      <span class="btn-text">Update Password</span>
      <div class="spinner"></div>
    </button>
  </form>
</div>
<script src="assets/js/config.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  const email  = params.get('email');
  if(!token||!email){
    document.getElementById('alertError').textContent='Invalid reset link.';
    document.getElementById('alertError').classList.add('show');
  }
  document.getElementById('resetForm').addEventListener('submit', e=>{
    e.preventDefault();
    const pwd  = document.getElementById('password').value;
    const conf = document.getElementById('confirm').value;
    const ae   = document.getElementById('alertError');
    const ao   = document.getElementById('alertSuccess');
    ae.classList.remove('show'); ao.classList.remove('show');
    if(pwd!==conf){ ae.textContent='Passwords do not match.'; ae.classList.add('show'); return; }
    const res = Auth.resetPassword(decodeURIComponent(email), token, pwd);
    if(!res.ok){ ae.textContent=res.error; ae.classList.add('show'); return; }
    ao.textContent=res.message; ao.classList.add('show');
    setTimeout(()=>location.href='login.html',1500);
  });
})();
</script>
</body>
</html>
