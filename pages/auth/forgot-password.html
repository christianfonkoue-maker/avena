<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Forgot Password — Avena</title>
  <link rel="stylesheet" href="../../assets/css/components/auth.css"/>
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand__icon"><svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor"/></svg></div>
    <span class="auth-brand__name">Avena</span>
  </div>

  <div style="font-size:2rem;margin-bottom:12px;text-align:center">🔑</div>
  <h1 class="auth-title" style="text-align:center">Forgot your password?</h1>
  <p class="auth-subtitle" style="text-align:center">Enter your university email and we'll send a reset link.</p>

  <div class="auth-alert auth-alert--error"   id="alertError"></div>
  <div class="auth-alert auth-alert--success" id="alertSuccess"></div>

  <form class="auth-form" id="forgotForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="email">University Email</label>
      <input class="form-input" id="email" type="email" placeholder="you@university.edu.gh" required/>
    </div>
    <button class="btn-auth" type="submit" id="submitBtn">
      <span class="btn-text">Send Reset Link</span>
      <div class="spinner"></div>
    </button>
  </form>

  <p class="auth-footer"><a class="auth-link" href="login.html">← Back to Sign In</a></p>
</div>
<script src="assets/js/config.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('submitBtn');
  const ae = document.getElementById('alertError');
  const ao = document.getElementById('alertSuccess');
  ae.classList.remove('show'); ao.classList.remove('show');
  btn.classList.add('loading'); btn.disabled=true;
  const res = await Auth.forgotPassword(email);
  btn.classList.remove('loading'); btn.disabled=false;
  if(!res.ok){ ae.textContent=res.error; ae.classList.add('show'); return; }
  ao.textContent=res.message; ao.classList.add('show');
});
</script>
</body>
</html>
