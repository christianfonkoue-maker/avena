<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Two-Factor Auth — Avena</title>
  <link rel="stylesheet" href="../../assets/css/components/auth.css"/>
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand__icon"><svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor"/></svg></div>
    <span class="auth-brand__name">Avena</span>
  </div>
  <div style="font-size:2.5rem;text-align:center;margin-bottom:12px">🛡️</div>
  <h1 class="auth-title" style="text-align:center">Two-Factor Auth</h1>
  <p class="auth-subtitle" style="text-align:center">Enter the 6-digit code sent to your university email.</p>
  <div class="auth-alert auth-alert--error"   id="alertError"></div>
  <div class="auth-alert auth-alert--success" id="alertSuccess"></div>
  <form class="auth-form" id="twoFAForm" novalidate>
    <div class="otp-group">
      <input class="otp-input" maxlength="1" inputmode="numeric"/>
      <input class="otp-input" maxlength="1" inputmode="numeric"/>
      <input class="otp-input" maxlength="1" inputmode="numeric"/>
      <input class="otp-input" maxlength="1" inputmode="numeric"/>
      <input class="otp-input" maxlength="1" inputmode="numeric"/>
      <input class="otp-input" maxlength="1" inputmode="numeric"/>
    </div>
    <button class="btn-auth" type="submit" id="submitBtn">
      <span class="btn-text">Verify</span>
      <div class="spinner"></div>
    </button>
  </form>
  <p class="auth-footer"><a class="auth-link" href="login.html">← Use a different account</a></p>
</div>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script>
(function(){
  const email     = sessionStorage.getItem('avena_2fa_email') || '';
  const otpInputs = [...document.querySelectorAll('.otp-input')];
  const ae = document.getElementById('alertError');
  const ao = document.getElementById('alertSuccess');

  otpInputs.forEach((inp,i)=>{
    inp.addEventListener('input',()=>{ inp.value=inp.value.replace(/\D/,''); if(inp.value&&i<5) otpInputs[i+1].focus(); });
    inp.addEventListener('keydown',e=>{ if(e.key==='Backspace'&&!inp.value&&i>0) otpInputs[i-1].focus(); });
  });

  document.getElementById('twoFAForm').addEventListener('submit',e=>{
    e.preventDefault();
    const code=otpInputs.map(i=>i.value).join('');
    if(code.length<6){ ae.textContent='Enter all 6 digits.'; ae.classList.add('show'); return; }
    const btn=document.getElementById('submitBtn');
    btn.classList.add('loading'); btn.disabled=true;
    const res=Auth.verify2FA(email,code);
    btn.classList.remove('loading'); btn.disabled=false;
    if(!res.ok){ ae.textContent=res.error; ae.classList.add('show'); return; }
    ao.textContent='Verified! Redirecting…'; ao.classList.add('show');
    setTimeout(()=>location.href='/index.html',1200);
  });
})();
</script>
</body>
</html>
