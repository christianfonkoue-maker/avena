<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Offer a Service — Avena</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/components/auth.css"/>
  <style>
    body{background:#f4f6fb;padding:0}
    .create-wrap{width:50%;margin:0 auto;padding:32px 24px}
    .auth-card{max-width:100%;margin-top:0}
    .section-sep{font-family:'Sora',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.07em;color:#9499b5;padding:4px 0;border-bottom:1px solid #e2e6f3;margin-bottom:4px}
    .page-bar{background:#fff;border-bottom:1px solid #e2e6f3;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;z-index:10;width:100%}
    .page-bar__brand{font-family:'Sora',sans-serif;font-weight:800;font-size:1.1rem;color:#4361ee}
    .image-preview { margin-top: 12px; max-width: 200px; border-radius: 8px; overflow: hidden; }
    .image-preview img { width: 100%; height: auto; display: none; }
    .image-preview img.show { display: block; }
    .image-placeholder { color: #7a7f9a; font-size: 0.8rem; margin-top: 8px; }
  </style>
</head>
<body>
<nav class="page-bar">
  <span class="page-bar__brand">Avena — Offer a Service</span>
  <a href="messaging/get-services.html" style="font-size:.85rem;color:#4361ee;font-weight:600;font-family:'Sora',sans-serif">← Browse Services</a>
</nav>
<div class="create-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Offer Your Skills</h1>
    <p class="auth-subtitle">Share your expertise with other students on campus.</p>
    <div class="auth-alert auth-alert--error"   id="alertError"></div>
    <div class="auth-alert auth-alert--success" id="alertSuccess"></div>
    <form class="auth-form" id="svcForm" novalidate enctype="multipart/form-data">
      <p class="section-sep">Service Info</p>
      <div class="form-group">
        <label class="form-label" for="title">Service Title *</label>
        <input class="form-input" id="title" type="text" placeholder="e.g. Full-Stack Web Development" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="category">Category *</label>
          <select class="form-input form-select" id="category" required>
            <option value="">Select…</option>
            <option>IT</option><option>Medicine</option><option>Finance</option>
            <option>Arts</option><option>Sport</option><option>Engineering</option>
            <option>Law</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="subcategory">Subcategory</label>
          <input class="form-input" id="subcategory" type="text" placeholder="e.g. Web Development"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="description">Description *</label>
        <textarea class="form-input" id="description" rows="5" style="resize:vertical" placeholder="Describe what you offer, your experience, tools used…" required></textarea>
      </div>
      <p class="section-sep">Pricing & Delivery</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="price">Price (GHS) *</label>
          <input class="form-input" id="price" type="number" min="1" step="0.01" placeholder="e.g. 150" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="priceType">Price Type</label>
          <select class="form-input form-select" id="priceType">
            <option value="fixed">Fixed Price</option>
            <option value="starting">Starting From</option>
            <option value="per_session">Per Session</option>
            <option value="per_hour">Per Hour</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="deliveryDays">Delivery Time (days)</label>
        <input class="form-input" id="deliveryDays" type="number" min="1" placeholder="e.g. 7 (leave empty if flexible)"/>
      </div>
      
      <p class="section-sep">Cover Image</p>
      <div class="form-group">
        <label class="form-label" for="imageFile">Photo du service</label>
        <input class="form-input" id="imageFile" name="image" type="file" accept="image/jpeg,image/png,image/webp,image/gif"/>
        <span class="form-hint">Sélectionnez une image (JPG, PNG, WebP, GIF)</span>
        <div class="image-preview" id="imagePreview">
          <img id="previewImg" alt="Aperçu">
        </div>
        <div class="image-placeholder" id="placeholderText">Aucune image sélectionnée</div>
      </div>
      
      <button class="btn-auth" type="submit" id="submitBtn">
        <span class="btn-text">🚀 Publish Service</span>
        <div class="spinner"></div>
      </button>
    </form>
    <p class="auth-footer"><a class="auth-link" href="get-services.html">← Back to Services</a></p>
  </div>
</div>

<script src="../assets/js/modules/auth.js"></script>
<script src="../assets/js/modules/services.js"></script>
<script>
(function(){
  const user = Auth.guard();
  if (!user) return;
  
  // Aperçu de l'image
  const fileInput = document.getElementById('imageFile');
  const previewImg = document.getElementById('previewImg');
  const placeholderText = document.getElementById('placeholderText');
  
  fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        previewImg.src = event.target.result;
        previewImg.classList.add('show');
        placeholderText.textContent = file.name;
      };
      reader.readAsDataURL(file);
    } else {
      previewImg.classList.remove('show');
      placeholderText.textContent = 'Aucune image sélectionnée';
    }
  });
  
  // Soumission du formulaire avec FormData
  document.getElementById('svcForm').addEventListener('submit', async e => {
    e.preventDefault();
    const ae = document.getElementById('alertError'), ao = document.getElementById('alertSuccess');
    ae.classList.remove('show'); ao.classList.remove('show');
    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading'); btn.disabled = true;
    
    const formData = new FormData();
    formData.append('title', document.getElementById('title').value.trim());
    formData.append('description', document.getElementById('description').value.trim());
    formData.append('category', document.getElementById('category').value);
    formData.append('subcategory', document.getElementById('subcategory').value.trim());
    formData.append('price', document.getElementById('price').value);
    formData.append('priceType', document.getElementById('priceType').value);
    const deliveryDays = document.getElementById('deliveryDays').value;
    if (deliveryDays) formData.append('deliveryDays', deliveryDays);
    
    const imageFile = document.getElementById('imageFile').files[0];
    if (imageFile) {
      formData.append('image', imageFile);
    }
    
    const token = localStorage.getItem('avena_token');
    try {
      const response = await fetch('http://localhost:5000/api/services', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`
        },
        body: formData
      });
      
      const result = await response.json();
      btn.classList.remove('loading'); btn.disabled = false;
      
      if (!response.ok) throw new Error(result.error || 'Creation failed');
      
      ao.textContent = result.message; ao.classList.add('show');
      setTimeout(() => location.href = `service.html?id=${result.service.id}`, 1400);
    } catch (error) {
      btn.classList.remove('loading'); btn.disabled = false;
      ae.textContent = error.message; ae.classList.add('show');
    }
  });
})();
</script>
</body>
</html>
