<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Avena — Messages</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/global.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .whatsapp-header { background: #075e54; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
    .back-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; display: none; }
    .whatsapp-header h1 { font-size: 1.2rem; font-weight: 600; flex: 1; }
    .header-icons { display: flex; gap: 20px; }
    .header-icons i { font-size: 1.2rem; cursor: pointer; }
    .whatsapp-container { display: flex; flex: 1; overflow: hidden; background: white; }
    .conversations-list { width: 360px; background: white; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.3s ease; }
    .conversations-list.hide { transform: translateX(-100%); }
    .search-bar { padding: 12px; background: #f6f6f6; }
    .search-bar input { width: 100%; padding: 8px 12px; border: none; border-radius: 20px; background: white; outline: none; }
    .conversations-scroll { flex: 1; overflow-y: auto; }
    .conversation-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #f0f2f5; }
    .conversation-item:hover, .conversation-item.active { background: #f0f2f5; }
    .conv-avatar { width: 50px; height: 50px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; flex-shrink: 0; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-weight: 600; margin-bottom: 4px; }
    .conv-last-msg { font-size: 0.8rem; color: #667781; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time { font-size: 0.7rem; color: #667781; }
    .unread-badge { background: #25d366; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #f8f9fa; overflow: hidden; }
    .chat-header { background: white; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #e9ecef; }
    .chat-header .conv-avatar { width: 40px; height: 40px; font-size: 1rem; }
    .chat-header-info h3 { font-size: 1rem; margin-bottom: 2px; }
    .chat-header-info p { font-size: 0.7rem; color: #25d366; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .chat-message { display: flex; }
    .chat-message.mine { justify-content: flex-end; }
    .message-bubble { max-width: 70%; padding: 8px 12px; border-radius: 16px; position: relative; }
    .chat-message.mine .message-bubble { background: #dcf8c5; color: #1a1d2e; border-bottom-right-radius: 4px; }
    .chat-message.theirs .message-bubble { background: white; color: #1a1d2e; border-bottom-left-radius: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.05); }
    .message-time { font-size: 0.65rem; color: #667781; margin-top: 4px; text-align: right; }
    .chat-input-area { background: white; padding: 12px 16px; display: flex; gap: 12px; align-items: center; border-top: 1px solid #e9ecef; }
    .chat-input-area input { flex: 1; padding: 10px 14px; border: none; border-radius: 24px; background: #f0f2f5; outline: none; }
    .chat-input-area button { background: #075e54; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: #667781; flex-direction: column; gap: 12px; }
    @media (max-width: 768px) { .conversations-list { position: absolute; left: 0; top: 0; bottom: 0; z-index: 20; width: 100%; background: white; } .conversations-list.hide { transform: translateX(-100%); } .back-btn { display: block; } }
  </style>
</head>
<body>

<div class="whatsapp-header">
  <button class="back-btn" id="mobileBackBtn"><i class="fa-solid fa-arrow-left"></i></button>
  <h1>Messages</h1>
  <div class="header-icons">
    <i class="fa-regular fa-pen-to-square" onclick="location.href='compose.html'"></i>
  </div>
</div>

<div class="whatsapp-container">
  <div class="conversations-list" id="conversationsList">
    <div class="search-bar">
      <input type="text" placeholder="Rechercher ou démarrer une nouvelle conversation" id="searchInput">
    </div>
    <div class="conversations-scroll" id="conversationsContainer">
      <div style="text-align:center; padding:40px">Chargement...</div>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-chat">
      <i class="fa-regular fa-comment-dots" style="font-size:3rem"></i>
      <p>Choisissez une conversation</p>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script src="../../assets/js/modules/messaging.js"></script>
<script src="../../assets/js/modules/chat.js"></script>
<script>
  const user = Session.get();
  if (!user) { location.href = '/pages/auth/login.html'; }

  let currentOtherUser = null;
  const API_URL = window.APP_CONFIG?.API_URL || 'https://avena-backend-os8d.onrender.com';

  const socket = io(API_URL);
  socket.on('connect', () => {
    console.log('WS connecte, user.id =', user.id);
    socket.emit('user:join', String(user.id));
  });

  socket.on('message:received', (data) => {
    const message = data.message || data;

    // DEBUG — retire ces logs une fois que tout fonctionne
    console.log('message:received =', JSON.stringify(message));

    // Accepter snake_case ET camelCase selon version backend
    const senderId = String(message.senderId ?? message.sender_id ?? '');
    const body     = message.body || '';
    const time     = message.createdAt || message.created_at || new Date().toISOString();

    if (!senderId || !body) {
      console.warn('message ignore — senderId ou body manquant');
      return;
    }

    if (currentOtherUser && senderId === String(currentOtherUser.id)) {
      // Conversation ouverte : afficher le message immediatement a droite
      appendMessageToChat(body, 'theirs', time);
      MessagingAPI.markAsRead(currentOtherUser.id);
      updateConversationItem(senderId, body, time, 0);
    } else {
      // Conversation fermee : badge +1 dans la liste gauche
      updateConversationItem(senderId, body, time, 1);
    }
  });

  function updateConversationItem(senderId, lastMsg, time, unreadDelta) {
    const item = document.querySelector('.conversation-item[data-id="' + senderId + '"]');
    if (!item) {
      loadConversations();
      return;
    }
    const lastMsgEl = item.querySelector('.conv-last-msg');
    const timeEl    = item.querySelector('.conv-time');
    let   badgeEl   = item.querySelector('.unread-badge');

    if (lastMsgEl) lastMsgEl.textContent = lastMsg.substring(0, 50);
    if (timeEl)    timeEl.textContent    = formatTime(time);

    if (unreadDelta > 0) {
      if (badgeEl) {
        badgeEl.textContent = (parseInt(badgeEl.textContent) || 0) + unreadDelta;
      } else {
        badgeEl             = document.createElement('div');
        badgeEl.className   = 'unread-badge';
        badgeEl.textContent = unreadDelta;
        item.appendChild(badgeEl);
      }
    } else if (badgeEl) {
      badgeEl.remove();
    }

    const container = document.getElementById('conversationsContainer');
    if (container) container.prepend(item);
  }

  function appendMessageToChat(text, type, createdAt) {
    const container = document.getElementById('chatMessages');
    if (!container) return;
    const time = createdAt ? new Date(createdAt).toLocaleTimeString() : new Date().toLocaleTimeString();
    const div  = document.createElement('div');
    div.className = 'chat-message ' + type;
    div.innerHTML =
      '<div class="message-bubble">' +
        '<div class="message-text">' + escapeHtml(text) + '</div>' +
        '<div class="message-time">' + time + '</div>' +
      '</div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function loadConversations() {
    const convs     = await MessagingAPI.getConversations();
    const container = document.getElementById('conversationsContainer');
    if (!convs.length) {
      container.innerHTML = '<div style="text-align:center;padding:40px">Aucune conversation</div>';
      return;
    }
    container.innerHTML = convs.map(function(c) {
      return '<div class="conversation-item" data-id="' + c.otherUser.id + '" data-name="' + escapeHtml(c.otherUser.name) + '">' +
        '<div class="conv-avatar">' + c.otherUser.name.charAt(0).toUpperCase() + '</div>' +
        '<div class="conv-info">' +
          '<div class="conv-name">' + escapeHtml(c.otherUser.name) + '</div>' +
          '<div class="conv-last-msg">' + escapeHtml((c.lastMessage || '').substring(0, 50)) + '</div>' +
        '</div>' +
        '<div class="conv-time">' + formatTime(c.lastMessageAt) + '</div>' +
        (c.unreadCount > 0 ? '<div class="unread-badge">' + c.unreadCount + '</div>' : '') +
      '</div>';
    }).join('');
    attachConversationClicks();
  }

  function attachConversationClicks() {
    document.querySelectorAll('.conversation-item').forEach(function(el) {
      el.addEventListener('click', function() {
        document.querySelectorAll('.conversation-item').forEach(function(i) { i.classList.remove('active'); });
        el.classList.add('active');
        var badge = el.querySelector('.unread-badge');
        if (badge) badge.remove();
        openConversation(el.dataset.id, el.dataset.name);
        if (window.innerWidth <= 768) document.getElementById('conversationsList').classList.add('hide');
      });
    });
  }

  async function openConversation(otherUserId, otherUserName) {
    currentOtherUser = { id: String(otherUserId), name: otherUserName };
    console.log('Conversation ouverte id =', currentOtherUser.id);

    var chatArea = document.getElementById('chatArea');
    chatArea.innerHTML =
      '<div class="chat-header">' +
        '<div class="conv-avatar">' + otherUserName.charAt(0).toUpperCase() + '</div>' +
        '<div class="chat-header-info"><h3>' + escapeHtml(otherUserName) + '</h3><p>en ligne</p></div>' +
      '</div>' +
      '<div class="chat-messages" id="chatMessages"></div>' +
      '<div class="chat-input-area">' +
        '<input type="text" id="messageInput" placeholder="Ecrire un message...">' +
        '<button id="sendMessageBtn"><i class="fa-regular fa-paper-plane"></i></button>' +
      '</div>';

    var messages          = await MessagingAPI.getConversation(otherUserId);
    var messagesContainer = document.getElementById('chatMessages');
    if (messages.length) {
      messagesContainer.innerHTML = messages.map(function(msg) {
        var sid    = String(msg.senderId ?? msg.sender_id ?? '');
        var isMine = sid === String(user.id);
        var t      = msg.createdAt || msg.created_at || '';
        return '<div class="chat-message ' + (isMine ? 'mine' : 'theirs') + '">' +
          '<div class="message-bubble">' +
            '<div class="message-text">' + escapeHtml(msg.body) + '</div>' +
            '<div class="message-time">' + (t ? new Date(t).toLocaleTimeString() : '') + '</div>' +
          '</div></div>';
      }).join('');
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    await MessagingAPI.markAsRead(otherUserId);

    var sendBtn = document.getElementById('sendMessageBtn');
    var input   = document.getElementById('messageInput');

    function sendMessage() {
      var body = input.value.trim();
      if (!body) return;
      appendMessageToChat(body, 'mine');
      if (socket && socket.connected) {
        socket.emit('message:send', { to: otherUserId, body: body, subject: '', senderName: (user.first_name + ' ' + user.last_name) });
      } else {
        MessagingAPI.sendMessage(otherUserId, body);
      }
      input.value = '';
      updateConversationItem(String(otherUserId), body, new Date().toISOString(), 0);
    }

    sendBtn.onclick  = sendMessage;
    input.onkeypress = function(e) { if (e.key === 'Enter') sendMessage(); };
    input.focus();
  }

  function formatTime(iso) {
    if (!iso) return '';
    var d   = new Date(iso);
    var now = new Date();
    return d.toDateString() === now.toDateString()
      ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : d.toLocaleDateString();
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m; });
  }

  document.getElementById('mobileBackBtn').addEventListener('click', function() {
    document.getElementById('conversationsList').classList.remove('hide');
  });

  loadConversations();
</script>
</body>
</html>
