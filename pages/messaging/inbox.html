<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Inbox — Avena</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    :root{--accent:#4361ee;--accent-light:#eef0fd;--bg:#f4f6fb;--surface:#fff;--border:#e2e6f3;--text:#1a1d2e;--muted:#7a7f9a;--font-h:'Sora',sans-serif;--font-b:'DM Sans',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}
    a{text-decoration:none;color:inherit}
    .page-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .page-bar__brand{font-family:var(--font-h);font-weight:800;font-size:1.1rem;color:var(--accent)}
    .btn{padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;font-family:var(--font-h);cursor:pointer;border:none;transition:all .2s}
    .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(.9)}
    .btn-ghost{background:none;color:var(--accent);border:1.5px solid var(--accent)}.btn-ghost:hover{background:var(--accent-light)}

    .msg-layout{display:flex;flex:1;max-width:1000px;margin:28px auto;width:100%;gap:0;background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden;min-height:560px}

    /* Sidebar */
    .msg-sidebar{width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
    .msg-sidebar__head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .msg-sidebar__title{font-family:var(--font-h);font-weight:700;font-size:.95rem}
    .conv-list{flex:1;overflow-y:auto}
    .conv-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;flex-direction:column;gap:4px}
    .conv-item:hover,.conv-item.active{background:var(--accent-light)}
    .conv-item__name{font-family:var(--font-h);font-weight:600;font-size:.88rem;display:flex;justify-content:space-between}
    .conv-item__preview{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-item__time{font-size:.72rem;color:var(--muted)}
    .unread-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:3px}
    .unread-count{background:var(--accent);color:#fff;border-radius:99px;font-size:.65rem;font-weight:700;padding:1px 6px;font-family:var(--font-h)}

    /* Thread */
    .msg-thread{flex:1;display:flex;flex-direction:column}
    .msg-thread__head{padding:16px;border-bottom:1px solid var(--border);font-family:var(--font-h);font-weight:700}
    .msg-thread__empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-direction:column;gap:8px}
    .msg-thread__empty span{font-size:2.5rem}
    .msg-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .bubble-wrap{display:flex;flex-direction:column;gap:2px}
    .bubble-wrap.mine{align-items:flex-end}
    .bubble{max-width:70%;padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.5}
    .bubble.mine{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
    .bubble.theirs{background:#f1f3f9;color:var(--text);border-bottom-left-radius:4px}
    .bubble-time{font-size:.68rem;color:var(--muted)}
    .msg-compose{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px}
    .msg-compose textarea{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font-b);font-size:.88rem;resize:none;outline:none;transition:border-color .2s;height:44px}
    .msg-compose textarea:focus{border-color:var(--accent)}
    @media(max-width:600px){.msg-sidebar{width:100%;display:none}.msg-sidebar.show{display:flex}.msg-layout{flex-direction:column;margin:0;border-radius:0;min-height:100vh}}
  </style>
</head>
<body>
<nav class="page-bar">
  <span class="page-bar__brand">Avena — Messages</span>
  <div style="display:flex;gap:8px">
    <a href="compose.html" class="btn btn-primary">+ Compose</a>
    <a href="../../index.html" class="btn btn-ghost">← Home</a>
  </div>
</nav>

<div style="max-width:1000px;margin:0 auto;width:100%;padding:0 16px">
  <div class="msg-layout">
    <div class="msg-sidebar" id="sidebar">
      <div class="msg-sidebar__head">
        <span class="msg-sidebar__title">Inbox <span class="unread-count" id="unreadTotal"></span></span>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>
    <div class="msg-thread" id="thread">
      <div class="msg-thread__empty"><span>💬</span><p>Select a conversation</p></div>
    </div>
  </div>
</div>

<script src="../../assets/js/modules/auth.js"></script>
<script src="../../assets/js/modules/messaging.js"></script>
<script>
(function(){
  const user = Auth.guard(); if(!user) return;
  const convList   = document.getElementById('convList');
  const thread     = document.getElementById('thread');
  const unreadTotal= document.getElementById('unreadTotal');
  let activeId     = null;

  function loadInbox() {
    const convs = Messaging.getConversations(user.id);
    const total = Messaging.totalUnread(user.id);
    unreadTotal.textContent = total > 0 ? total : '';
    convList.innerHTML = convs.length ? convs.map(c=>`
      <div class="conv-item${activeId===c.otherId?' active':''}" data-id="${c.otherId}" data-name="${c.otherName}">
        <div class="conv-item__name">
          <span>${c.otherName}</span>
          ${c.unread>0?`<span class="unread-count">${c.unread}</span>`:''}
        </div>
        <div class="conv-item__preview">${c.lastMsg.body}</div>
        <div class="conv-item__time">${Messaging.formatTime(c.lastMsg.sentAt)}</div>
      </div>`).join('')
    : '<p style="padding:24px;text-align:center;color:var(--muted);font-size:.85rem">No messages yet.</p>';

    convList.querySelectorAll('.conv-item').forEach(el=>{
      el.addEventListener('click',()=>openThread(el.dataset.id, el.dataset.name));
    });

    // Auto-open from URL param
    const urlId = new URLSearchParams(location.search).get('userId');
    const urlName = new URLSearchParams(location.search).get('name');
    if (urlId && !activeId) openThread(urlId, urlName||'User');
  }

  function openThread(otherId, otherName) {
    activeId = otherId;
    Messaging.markRead(user.id, otherId);
    document.querySelectorAll('.conv-item').forEach(c=>c.classList.toggle('active',c.dataset.id===otherId));
    loadInbox();

    const msgs = Messaging.getThread(user.id, otherId);
    thread.innerHTML = `
      <div class="msg-thread__head">${otherName}</div>
      <div class="msg-messages" id="msgBody">
        ${msgs.length ? msgs.map(m=>{
          const mine = m.from===user.id;
          return `<div class="bubble-wrap ${mine?'mine':''}">
            <div class="bubble ${mine?'mine':'theirs'}">${m.body}</div>
            <span class="bubble-time">${Messaging.formatTime(m.sentAt)}</span>
          </div>`;
        }).join('') : '<p style="text-align:center;color:var(--muted);padding:24px;font-size:.85rem">Start the conversation!</p>'}
      </div>
      <div class="msg-compose">
        <textarea id="replyBox" placeholder="Type a message…" rows="1"></textarea>
        <button class="btn btn-primary" id="sendBtn">Send</button>
      </div>`;

    const msgBody = document.getElementById('msgBody');
    msgBody.scrollTop = msgBody.scrollHeight;

    const replyBox = document.getElementById('replyBox');
    replyBox.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
    document.getElementById('sendBtn').addEventListener('click', sendMsg);

    async function sendMsg() {
      const body = replyBox.value.trim();
      if (!body) return;
      replyBox.value='';
      await Messaging.send({ from:user.id, fromName:`${user.firstName} ${user.lastName}`, to:otherId, toName:otherName, body });
      openThread(otherId, otherName);
    }
  }

  loadInbox();
})();
</script>
</body>
</html>
