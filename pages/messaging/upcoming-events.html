<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Upcoming Events — Avena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent:#4361ee; --accent-light:#eef0fd; --accent-dark:#3451d1;
      --bg:#f4f6fb; --surface:#fff; --border:#e2e6f3;
      --text:#1a1d2e; --muted:#7a7f9a;
      --success:#38a169; --warning:#d69e2e; --danger:#e53e3e;
      --radius:14px; --shadow:0 4px 24px rgba(67,97,238,.1);
      --font-h:'Sora',sans-serif; --font-b:'DM Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh}
    a{text-decoration:none;color:inherit}

    /* ── Top bar ── */
    .page-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .page-bar__brand{font-family:var(--font-h);font-weight:800;font-size:1.1rem;color:var(--accent)}
    .page-bar__actions{display:flex;gap:10px}
    .btn{padding:9px 18px;border-radius:9px;font-size:.85rem;font-weight:600;font-family:var(--font-h);cursor:pointer;border:none;transition:all .2s}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(67,97,238,.25)}
    .btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
    .btn-ghost:hover{background:var(--accent-light)}

    /* ── Layout ── */
    .page-wrap{max-width:1280px;margin:0 auto;padding:32px 24px}

    /* ── Hero ── */
    .events-hero{background:linear-gradient(135deg,var(--accent) 0%,#6b46c1 100%);border-radius:var(--radius);padding:48px 40px;margin-bottom:32px;color:#fff;position:relative;overflow:hidden}
    .events-hero::after{content:'🎉';position:absolute;right:40px;top:50%;transform:translateY(-50%);font-size:6rem;opacity:.2}
    .events-hero h1{font-family:var(--font-h);font-size:2rem;font-weight:800;margin-bottom:8px}
    .events-hero p{font-size:1rem;opacity:.85}

    /* ── Filters ── */
    .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;align-items:center}
    .filter-chip{padding:7px 16px;border-radius:99px;border:1.5px solid var(--border);font-size:.82rem;font-weight:600;font-family:var(--font-h);cursor:pointer;background:var(--surface);color:var(--muted);transition:all .2s}
    .filter-chip.active,.filter-chip:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .filter-search{margin-left:auto;padding:8px 16px;border:1.5px solid var(--border);border-radius:99px;font-family:var(--font-b);font-size:.85rem;outline:none;width:220px;transition:border-color .2s}
    .filter-search:focus{border-color:var(--accent)}

    /* ── Grid ── */
    .events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

    /* ── Event Card ── */
    .evt-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:transform .22s,box-shadow .22s;display:flex;flex-direction:column}
    .evt-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
    .evt-card__img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:transform .3s}
    .evt-card:hover .evt-card__img{transform:scale(1.04)}
    .evt-card__img-wrap{overflow:hidden;position:relative}
    .evt-card__badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:99px;font-size:.72rem;font-weight:700;font-family:var(--font-h)}
    .evt-card__badge--free{background:#c6f6d5;color:#276749}
    .evt-card__badge--paid{background:#fed7d7;color:#9b2c2c}
    .evt-card__body{padding:16px;flex:1;display:flex;flex-direction:column;gap:8px}
    .evt-card__cat{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-family:var(--font-h)}
    .evt-card__title{font-family:var(--font-h);font-weight:700;font-size:1rem;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .evt-card__meta{display:flex;flex-direction:column;gap:4px;font-size:.8rem;color:var(--muted)}
    .evt-card__meta span{display:flex;align-items:center;gap:6px}
    .evt-card__footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}
    .evt-card__price{font-family:var(--font-h);font-weight:700;font-size:.95rem;color:var(--accent)}
    .evt-card__price.free{color:var(--success)}
    .evt-card__spots{font-size:.75rem;color:var(--muted)}
    .evt-card__spots.low{color:var(--danger);font-weight:600}
    .btn-sm{padding:7px 14px;border-radius:8px;font-size:.78rem;font-weight:600;font-family:var(--font-h);cursor:pointer;border:none;background:var(--accent);color:#fff;transition:all .2s}
    .btn-sm:hover{background:var(--accent-dark)}

    /* ── Empty ── */
    .events-empty{text-align:center;padding:64px 24px;color:var(--muted)}
    .events-empty__icon{font-size:3rem;margin-bottom:12px;display:block}

    /* ── Skeleton ── */
    .sk{background:linear-gradient(90deg,#f0f0f5 25%,#e4e7f0 50%,#f0f0f5 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .sk-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
    .sk-img{aspect-ratio:16/9;width:100%}
    .sk-body{padding:16px;display:flex;flex-direction:column;gap:10px}
    .sk-line{height:12px}.sk-line--80{width:80%}.sk-line--60{width:60%}.sk-line--40{width:40%}
  </style>
</head>
<body>

<nav class="page-bar">
  <span class="page-bar__brand">Avena — Events</span>
  <div class="page-bar__actions">
    <a href="../event-create.html" class="btn btn-primary">+ Create Event</a>
    <a href="../../index.html"  class="btn btn-ghost">← Home</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="events-hero">
    <h1>Upcoming Events</h1>
    <p>Discover conferences, workshops, sports & more happening on your campus.</p>
  </div>

  <div class="filters">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="Technology">Technology</button>
    <button class="filter-chip" data-filter="Health">Health</button>
    <button class="filter-chip" data-filter="Finance">Finance</button>
    <button class="filter-chip" data-filter="Arts">Arts</button>
    <button class="filter-chip" data-filter="Sports">Sports</button>
    <input class="filter-search" id="searchInput" type="search" placeholder="Search events…"/>
  </div>

  <div class="events-grid" id="eventsGrid"></div>
</div>
<script src="assets/js/config.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script src="../../assets/js/modules/events.js"></script>
<script>
(function(){
  const grid   = document.getElementById('eventsGrid');
  const chips  = document.querySelectorAll('.filter-chip');
  const search = document.getElementById('searchInput');
  let allEvents = [];
  let activeFilter = 'all';

  function skeletons() {
    grid.innerHTML = Array.from({length:6},()=>`
      <div class="sk-card">
        <div class="sk sk-img"></div>
        <div class="sk-body">
          <div class="sk sk-line sk-line--40"></div>
          <div class="sk sk-line sk-line--80"></div>
          <div class="sk sk-line sk-line--60"></div>
        </div>
      </div>`).join('');
  }

  function renderCard(e) {
    const spots    = Events.spotsLeft(e);
    const spotsLow = spots !== null && spots <= 10;
    const spotsHtml= spots !== null
      ? `<span class="evt-card__spots ${spotsLow?'low':''}">${spotsLow?'⚠️ ':''} ${spots} spots left</span>`
      : '';
    return `
      <article class="evt-card" data-id="${e.id}">
        <div class="evt-card__img-wrap">
          <img class="evt-card__img" src="${e.coverImage}" alt="${e.title}" loading="lazy"
            onerror="this.src='https://placehold.co/800x450/4361ee/fff?text=Event'"/>
          <span class="evt-card__badge evt-card__badge--${e.isPaid?'paid':'free'}">${e.isPaid?'Paid':'Free'}</span>
        </div>
        <div class="evt-card__body">
          <span class="evt-card__cat">${e.category}</span>
          <h2 class="evt-card__title">${e.title}</h2>
          <div class="evt-card__meta">
            <span>📅 ${Events.formatDate(e.date)}</span>
            <span>📍 ${e.location}</span>
            <span>👤 ${e.organizer?.name ?? 'Organizer'}</span>
          </div>
          <div class="evt-card__footer">
            <div>
              <div class="evt-card__price ${e.isPaid?'':'free'}">${Events.formatPrice(e.price)}</div>
              ${spotsHtml}
            </div>
            <a href="../event.html?id=${e.id}" class="btn-sm">View →</a>
          </div>
        </div>
      </article>`;
  }

  function renderGrid(events) {
    if (!events.length) {
      grid.innerHTML=`<div class="events-empty" style="grid-column:1/-1"><span class="events-empty__icon">📭</span><p>No events found.</p></div>`;
      return;
    }
    grid.innerHTML = events.map(renderCard).join('');
  }

  function applyFilters() {
    const q = search.value.toLowerCase().trim();
    let filtered = allEvents;
    if (activeFilter !== 'all') filtered = filtered.filter(e => e.category===activeFilter);
    if (q) filtered = filtered.filter(e => e.title.toLowerCase().includes(q)||e.description.toLowerCase().includes(q));
    renderGrid(filtered);
  }

  chips.forEach(chip => {
    chip.addEventListener('click', ()=>{
      chips.forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      applyFilters();
    });
  });
  search.addEventListener('input', applyFilters);

  async function init() {
    skeletons();
    allEvents = await Events.getAll();
    renderGrid(allEvents);
  }
  init();
})();
</script>
</body>
</html>
