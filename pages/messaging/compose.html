<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Compose — Avena</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../assets/css/components/auth.css"/>
  <style>body{background:#f4f6fb;padding:0}.compose-wrap{max-width:600px;margin:32px auto;padding:0 16px}.auth-card{margin-top:0;max-width:100%}</style>
</head>
<body>
<div class="compose-wrap">
  <div class="auth-card">
    <h1 class="auth-title">New Message</h1>
    <p class="auth-subtitle">Send a message to any Avena user.</p>
    <div class="auth-alert auth-alert--error"   id="alertError"></div>
    <div class="auth-alert auth-alert--success" id="alertSuccess"></div>
    <form class="auth-form" id="composeForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="toEmail">Recipient (email or user ID)</label>
        <input class="form-input" id="toEmail" type="text" placeholder="user@university.edu.gh" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="subject">Subject</label>
        <input class="form-input" id="subject" type="text" placeholder="Subject (optional)"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="body">Message *</label>
        <textarea class="form-input" id="body" rows="6" placeholder="Write your message here…" style="resize:vertical" required></textarea>
      </div>
      <button class="btn-auth" type="submit" id="submitBtn">
        <span class="btn-text">✉️ Send Message</span>
        <div class="spinner"></div>
      </button>
    </form>
    <p class="auth-footer"><a class="auth-link" href="inbox.html">← Back to Inbox</a></p>
  </div>
</div>
<script src="../../assets/js/modules/auth.js"></script>
<script src="../../assets/js/modules/messaging.js"></script>
<script>
(function(){
  const user = Auth.guard(); if(!user) return;
  document.getElementById('composeForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const ae=document.getElementById('alertError'),ao=document.getElementById('alertSuccess');
    ae.classList.remove('show'); ao.classList.remove('show');
    const btn=document.getElementById('submitBtn');
    btn.classList.add('loading'); btn.disabled=true;
    const toEmail = document.getElementById('toEmail').value.trim();
    const res = await Messaging.send({
      from:`${user.id}`, fromName:`${user.firstName} ${user.lastName}`,
      to: toEmail, toName: toEmail,
      subject: document.getElementById('subject').value.trim(),
      body: document.getElementById('body').value.trim(),
    });
    btn.classList.remove('loading'); btn.disabled=false;
    if(!res.ok){ ae.textContent=res.error; ae.classList.add('show'); return; }
    ao.textContent=res.message; ao.classList.add('show');
    setTimeout(()=>location.href='inbox.html',1400);
  });
})();
</script>
</body>
</html>
