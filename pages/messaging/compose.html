<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau message — Avena</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/global.css">
  <style>
    * { box-sizing: border-box; }
    body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; font-family: 'DM Sans', sans-serif; }
    .compose-card {
      background: white;
      max-width: 550px;
      width: 100%;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }
    .compose-card h1 { font-size: 1.4rem; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    .form-group { margin-bottom: 20px; position: relative; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #1a1d2e; }
    input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #e2e6f3; border-radius: 14px; font-size: 0.9rem; transition: 0.2s; outline: none; }
    input:focus, textarea:focus { border-color: #4361ee; box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
    button { background: #075e54; color: white; border: none; padding: 12px; border-radius: 40px; width: 100%; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
    button:hover { background: #054a41; }
    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #e2e6f3;
      border-top: none;
      border-radius: 0 0 14px 14px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }
    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #f0f2f5;
    }
    .suggestion-item:hover { background: #f0f2f5; }
    .suggestion-avatar {
      width: 36px;
      height: 36px;
      background: #4361ee;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    .suggestion-info { flex: 1; }
    .suggestion-name { font-weight: 600; margin-bottom: 2px; }
    .suggestion-email { font-size: 0.7rem; color: #7a7f9a; }
    .loader { display: none; text-align: center; margin-top: 16px; color: #7a7f9a; }
    .result-msg { margin-top: 16px; text-align: center; font-size: 0.9rem; }
    .result-msg.error { color: #e53e3e; }
    .result-msg.success { color: #38a169; }
    .char-counter { font-size: 0.7rem; color: #7a7f9a; text-align: right; margin-top: 4px; }
  </style>
</head>
<body>

<div class="compose-card">
  <h1><i class="fa-regular fa-pen-to-square"></i> Nouveau message</h1>
  <form id="composeForm">
    <div class="form-group">
      <label>Destinataire</label>
      <input type="text" id="recipientInput" placeholder="Nom, email ou ID" autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
      <input type="hidden" id="recipientId">
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea id="messageBody" rows="4" placeholder="Écrivez votre message..." maxlength="500"></textarea>
      <div class="char-counter"><span id="charCount">0</span>/500</div>
    </div>
    <button type="submit" id="sendBtn">Envoyer</button>
  </form>
  <div id="loader" class="loader">⏳ Envoi en cours...</div>
  <div id="resultMsg" class="result-msg"></div>
</div>

<script src="/assets/js/config.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script src="../../assets/js/modules/messaging.js"></script>
<script>
  const user = Session.get();
  if (!user) {
    location.href = '/pages/auth/login.html';
  }

  const API_URL = window.APP_CONFIG?.API_URL || 'https://avena-backend-os8d.onrender.com';
  const token = localStorage.getItem('avena_token');

  // Éléments DOM
  const recipientInput = document.getElementById('recipientInput');
  const suggestionsDiv = document.getElementById('suggestions');
  const recipientIdHidden = document.getElementById('recipientId');
  const messageBody = document.getElementById('messageBody');
  const charCountSpan = document.getElementById('charCount');
  const sendBtn = document.getElementById('sendBtn');
  const loader = document.getElementById('loader');
  const resultMsg = document.getElementById('resultMsg');

  // Compteur de caractères
  messageBody.addEventListener('input', () => {
    charCountSpan.textContent = messageBody.value.length;
  });

  // Recherche de destinataires
  let searchTimeout;
  recipientInput.addEventListener('input', async () => {
    const query = recipientInput.value.trim();
    if (query.length < 2) {
      suggestionsDiv.style.display = 'none';
      recipientIdHidden.value = '';
      return;
    }

    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
      try {
        const res = await fetch(`${API_URL}/api/users/search?q=${encodeURIComponent(query)}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const users = data.users || [];

        if (!users.length) {
          suggestionsDiv.style.display = 'none';
          return;
        }

        suggestionsDiv.innerHTML = users.map(u => `
          <div class="suggestion-item" data-id="${u.id}" data-name="${u.first_name} ${u.last_name}" data-email="${u.email}">
            <div class="suggestion-avatar">${(u.first_name?.charAt(0) || 'U')}</div>
            <div class="suggestion-info">
              <div class="suggestion-name">${escapeHtml(u.first_name)} ${escapeHtml(u.last_name)}</div>
              <div class="suggestion-email">${escapeHtml(u.email)}</div>
            </div>
          </div>
        `).join('');
        suggestionsDiv.style.display = 'block';

        document.querySelectorAll('.suggestion-item').forEach(item => {
          item.addEventListener('click', () => {
            recipientInput.value = item.dataset.name;
            recipientIdHidden.value = item.dataset.id;
            suggestionsDiv.style.display = 'none';
          });
        });
      } catch (err) {
        console.error('Search error:', err);
      }
    }, 300);
  });

  // Clic ailleurs ferme les suggestions
  document.addEventListener('click', (e) => {
    if (!recipientInput.contains(e.target)) {
      suggestionsDiv.style.display = 'none';
    }
  });

  // Envoi du message
  document.getElementById('composeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const toId = recipientIdHidden.value;
    const body = messageBody.value.trim();

    resultMsg.innerHTML = '';
    resultMsg.className = 'result-msg';

    if (!toId) {
      resultMsg.textContent = 'Veuillez sélectionner un destinataire valide.';
      resultMsg.classList.add('error');
      return;
    }
    if (!body) {
      resultMsg.textContent = 'Veuillez écrire un message.';
      resultMsg.classList.add('error');
      return;
    }

    sendBtn.disabled = true;
    loader.style.display = 'block';

    const result = await MessagingAPI.sendMessage(toId, body);
    
    loader.style.display = 'none';
    sendBtn.disabled = false;

    if (result.ok) {
      resultMsg.textContent = '✅ Message envoyé ! Redirection...';
      resultMsg.classList.add('success');
      setTimeout(() => {
        location.href = 'inbox.html';
      }, 1200);
    } else {
      resultMsg.textContent = '❌ Erreur : destinataire introuvable ou problème réseau.';
      resultMsg.classList.add('error');
    }
  });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
  }
</script>
</body>
</html>
