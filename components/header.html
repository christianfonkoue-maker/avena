<head>

</head>
<body>

        <div class="header_main">
            <div class="main1logo">
                <img src="/assets/images/Logo vectoriel Avena.png" alt="Avena">
            </div>
            <div class="main2sec">
                <div class="main2">
                    <div class="main2three">

                    </div>
                    <div class="main2five">

                </div>

            <div class="main3sec">
                <div class="main3">
                    <div class="main3one">
                        <div class="main3one_up">

                        </div>
                        <div class="main3one_down">
                            <img src="/assets/images/country-flags-main/svg/gh.svg" alt="GH">
                            <p><b>GH</b></p>
                        </div>
                    </div>

                    <div class="main3two">
                        <i class="fa-regular fa-envelope fa-lg"></i>
                        <a href="/pages/messaging/inbox.html">Messages</a>
                    </div>

                    <div class="main3four" id="authButton">
                        <a href="/pages/auth/login.html">Sign in</a>
                    </div>

                    <!-- Menu utilisateur (affiché uniquement si connecté) -->
                    <div class="user-menu" id="userMenu" style="display:none">
                        <div class="dropdown-toggle" id="userDropdownToggle">
                            <div class="user-avatar" id="userAvatar">U</div>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="user-dropdown" id="userDropdown">
                            <a href="/pages/dashboard.html">
                                <i class="fa-regular fa-chart-line"></i> Dashboard
                            </a>
                            <a href="/pages/profile.html">
                                <i class="fa-regular fa-user"></i> Mon profil
                            </a>
                            <hr>
                            <a href="/pages/messaging/inbox.html">
                                <i class="fa-regular fa-envelope"></i> Messages
                            </a>
                            <a href="#" id="logoutBtn">
                                <i class="fa-regular fa-sign-out-alt"></i> Déconnexion
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="header_btm">
            <div class="hbtm_left">
                <div class="hbtm_left1 nav-item--categories" id="categoryTrigger">
                    <button class="nav-btn categories-btn">
                        <i class="fa-solid fa-bars-staggered"></i>
                        <p>All Category</p>
                    </button>
                    <div class="mega-menu" id="megaMenu" inert>
                        <div class="mega-menu__inner">
                            <aside class="mega-menu__sidebar">

                            </aside>
                            <div class="mega-menu__content"></div>
                        </div>
                    </div>
                </div>
                <div class="hbtm_left1">
                    <a href="/pages/messaging/get-services.html">Get a Services</a>
                </div>
                <div class="hbtm_left1">
                    <a href="/pages/messaging/upcoming-events.html">Upcoming Events</a>
                </div>
                <div class="hbtm_left1">
                    <a href="/pages/marketplace.html">Marketplace</a>
                </div>
            </div>
            <div class="hbtm_right">
                <div class="hbtm_left1">
                    <a href="/pages/sell.html">Sell</a>
                </div>
                <div class="hbtm_left1">
                    <a href="/pages/service-create.html">Offer a Service</a>

            </div>
        </div>
    </header>
    <div class="mega-menu-backdrop" id="menuBackdrop"></div>

    <script src="assets/js/config.js"></script>
    

    <!-- Auth UI géré par avenna-header.js → _updateAuthUI() -->
   <script>
  const session = localStorage.getItem('avena_session');
  const user = session ? JSON.parse(session) : null;
  const authBtn = document.getElementById('authButton');
  const userMenu = document.getElementById('userMenu');
  const userAvatar = document.getElementById('userAvatar');

  function updateHeaderAvatar(avatarUrl, initial) {
    if (!userAvatar) return;
    if (avatarUrl) {
      // Afficher une image
      userAvatar.innerHTML = '';
      const img = document.createElement('img');
      img.src = avatarUrl;
      img.style.width = '36px';
      img.style.height = '36px';
      img.style.borderRadius = '50%';
      img.style.objectFit = 'cover';
      userAvatar.appendChild(img);
    } else {
      // Afficher l'initiale
      userAvatar.textContent = initial || 'U';
    }
  }

  if (user && user.first_name) {
    if (authBtn) authBtn.style.display = 'none';
    if (userMenu) userMenu.style.display = 'block';
    updateHeaderAvatar(user.avatar_url, user.first_name.charAt(0).toUpperCase());
  } else {
    if (authBtn) authBtn.style.display = 'flex';
    if (userMenu) userMenu.style.display = 'none';
  }

  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.clear();
      sessionStorage.clear();
      window.location.href = '/index.html';
    });
  }
</script>
</body>
</html>
